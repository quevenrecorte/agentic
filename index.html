<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Agentic Usage Monitor v1.6</title><link rel="stylesheet" href="style.css"></head><body><main>
<section id="auth" class="view auth"><div class="authbox"><div class="brand">A</div><small>AGENTIC APP</small><h1>Usage Monitor</h1><p>Sign in to sync your account usage cycles.</p><form id="loginForm"><input id="loginEmail" type="email" placeholder="Email" required><input id="loginPassword" type="password" placeholder="Password" minlength="6" required><p id="msg"></p><button>Sign In</button><button type="button" id="register" class="secondary">Create Account</button></form></div></section>
<section id="dashboard" class="view dashboard is-hidden"><header><div><small>AGENTIC APP · V1.6</small><h1>Agentic Usage Monitor</h1><div class="qcode">by qCode Systems</div><p id="user"></p></div><div class="headerBtns"><button id="privacy" class="icon secondary" title="Privacy mode">◉</button><button id="theme" class="icon secondary" title="Toggle theme">☾</button><button id="add">+ Add Account</button><button id="logout" class="secondary">Sign Out</button></div></header>
<div class="stats"><div><b id="total">0</b><span>Accounts</span></div><div><b id="waiting">0</b><span>In cooldown</span></div><div><b id="ready">0</b><span>Available</span></div></div><div id="list" class="list"></div>
<section id="activitySection" class="activity"><div class="activityHead"><h2>Recent Activity</h2><span>Latest 20 events</span></div><div id="activity"></div></section></section></main>
<dialog id="modal"><form id="accountForm"><div class="modalHead"><h2 id="modalTitle">Add Account</h2><button type="button" id="x" class="close">×</button></div><input id="editId" type="hidden">
<label>Email account<input id="email" type="email" required></label><label>Agentic / service name<input id="agenticName" type="text" placeholder="e.g. Codex, Antigravity, Replit" maxlength="80" required></label><label>Limit last reached<input id="limitDate" type="datetime-local" required></label>
<label>Reset period<select id="period"><option value="week">1 week</option><option value="month">1 month</option><option value="custom">Custom range</option></select></label>
<div id="customWrap" class="customWrap is-hidden"><label>Custom duration<div class="customRow"><input id="customValue" type="number" min="1" value="1"><select id="customUnit"><option value="days">Days</option><option value="weeks">Weeks</option><option value="months">Months</option></select></div></label></div>
<div class="actions"><button type="button" id="cancel" class="secondary">Cancel</button><button>Save</button></div></form></dialog><script type="module" src="app.js"></script></body></html>
